<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SparkInsight — Dataset Explorer</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebaseConfig.js"></script>
  <script src="script.js?v=20260327"></script>
</head>
<body>
<div class="app-shell">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar"></aside>

  <!-- Main -->
  <div class="main-content">
    <header class="top-header">
      <div>
        <div class="header-title">Dataset Explorer</div>
        <div class="header-subtitle">Select a dataset to begin distributed analytics</div>
      </div>
      <div class="header-actions">
        <div style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text-muted);">
          <span class="status-dot online"></span> Platform Online
        </div>
        <button class="btn btn-secondary btn-sm" onclick="loadDatasets()">🔄 Refresh</button>
      </div>
    </header>

    <div class="page-content">

      <!-- Stats Row -->
      <div class="stats-grid mb-6" id="catalog-stats">
        <div class="stat-card blue skeleton" style="height:88px;"></div>
        <div class="stat-card violet skeleton" style="height:88px;"></div>
        <div class="stat-card emerald skeleton" style="height:88px;"></div>
        <div class="stat-card amber skeleton" style="height:88px;"></div>
      </div>

      <!-- Search & Filter Bar -->
      <div class="card mb-6" style="padding:16px 20px;">
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center;">
          <input type="text" class="form-input" id="search-datasets"
            placeholder="🔍 Search datasets by name, category..."
            style="flex:1;min-width:220px;max-width:360px;" oninput="filterDatasets()" />
          <div style="display:flex;gap:8px;flex-wrap:wrap;" id="category-filters"></div>
          <div style="margin-left:auto;font-size:12px;color:var(--text-muted);" id="dataset-count"></div>
        </div>
      </div>

      <!-- Dataset Grid -->
      <div id="datasets-grid" class="datasets-grid"></div>

      <!-- Empty State -->
      <div id="empty-state" class="empty-state hidden">
        <div class="empty-state-icon">🗃️</div>
        <div class="empty-state-title">No datasets found</div>
        <div class="empty-state-desc">Try a different search term or category filter.</div>
      </div>

    </div>
  </div>
</div>

<!-- Dataset Detail Modal -->
<div id="modal-overlay" class="hidden"
  style="position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);"
  onclick="closeModal(event)">
  <div style="background:var(--bg-card);border:1px solid var(--border-glow);border-radius:var(--radius-xl);max-width:620px;width:90%;max-height:85vh;overflow-y:auto;padding:32px;"
    onclick="event.stopPropagation()">
    <div id="modal-content"></div>
  </div>
</div>

<script>
  // ── KEY FIX: initFirebase() must be called FIRST so the _authReady promise
  // is created before requireAuth() awaits it. ───────────────────────────────
  initFirebase();

  let allDatasets   = [];
  let activeCategory = 'all';

  (async () => {
    // Build sidebar immediately (before auth) so the page doesn't flash blank
    document.getElementById('sidebar').innerHTML = buildSidebar('datasets');

    // Wait for Firebase to resolve persisted session — no more redirect loop
    await requireAuth();

    // Rebuild sidebar now that currentUser is available
    document.getElementById('sidebar').innerHTML = buildSidebar('datasets');

    applyChartDefaults();
    await loadDatasets();
  })();

  async function loadDatasets() {
    renderSkeletons();
    try {
      const data = await api('GET', '/datasets');
      allDatasets = data.datasets || [];
      renderStats(allDatasets);
      renderCategoryFilters(allDatasets);
      renderDatasets(allDatasets);
    } catch (e) {
      toast('Failed to load datasets', e.message, 'error');
    }
  }

  function renderStats(datasets) {
    const categories = [...new Set(datasets.map(d => d.category))].length;
    const formats    = [...new Set(datasets.map(d => d.format))];
    document.getElementById('catalog-stats').innerHTML = `
      <div class="stat-card blue">
        <div class="stat-label">Total Datasets</div>
        <div class="stat-value">${datasets.length}</div>
        <div class="stat-delta neutral">Multi-domain catalog</div>
      </div>
      <div class="stat-card violet">
        <div class="stat-label">Categories</div>
        <div class="stat-value">${categories}</div>
        <div class="stat-delta neutral">Domains covered</div>
      </div>
      <div class="stat-card emerald">
        <div class="stat-label">Largest Dataset</div>
        <div class="stat-value mono" style="font-size:18px;">300GB+</div>
        <div class="stat-delta neutral">Common Crawl logs</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Formats</div>
        <div class="stat-value">${formats.join(' · ')}</div>
        <div class="stat-delta neutral">Columnar optimized</div>
      </div>
    `;
  }

  function renderCategoryFilters(datasets) {
    const cats = ['all', ...new Set(datasets.map(d => d.category))];
    document.getElementById('category-filters').innerHTML = cats.map(c => `
      <button class="btn btn-sm ${c === activeCategory ? 'btn-primary' : 'btn-ghost'}"
        onclick="setCategoryFilter('${c}')">${c === 'all' ? '🌐 All' : c}</button>
    `).join('');
  }

  function setCategoryFilter(cat) {
    activeCategory = cat;
    renderCategoryFilters(allDatasets);
    filterDatasets();
  }

  function filterDatasets() {
    const q = document.getElementById('search-datasets').value.toLowerCase();
    const filtered = allDatasets.filter(d => {
      const matchCat = activeCategory === 'all' || d.category === activeCategory;
      const matchQ   = !q ||
        d.dataset_name.toLowerCase().includes(q) ||
        d.category.toLowerCase().includes(q) ||
        (d.description || '').toLowerCase().includes(q);
      return matchCat && matchQ;
    });
    renderDatasets(filtered);
  }

  function renderDatasets(datasets) {
    const grid  = document.getElementById('datasets-grid');
    const empty = document.getElementById('empty-state');
    document.getElementById('dataset-count').textContent =
      `${datasets.length} dataset${datasets.length !== 1 ? 's' : ''}`;

    if (!datasets.length) {
      grid.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    const categoryEmojis = {
      finance:'💹', transportation:'🚖', healthcare:'🏥', logs:'📜',
      ecommerce:'🛒', climate:'🌍', geographical:'🗺️', public_data:'🏛️',
      social_media:'📱', education:'🎓',
    };

    grid.innerHTML = datasets.map(d => `
      <div class="dataset-card" onclick="openDatasetModal('${d.dataset_name}')">
        <div class="dataset-card-header">
          <span class="dataset-category-badge badge-${d.category}">${d.category}</span>
          <span style="font-size:22px;">${categoryEmojis[d.category] || '📦'}</span>
        </div>
        <div class="dataset-name">${d.dataset_name.replace(/_/g,' ')}</div>
        <div class="dataset-desc">${d.description}</div>
        <div class="dataset-meta-row">
          <div class="meta-chip">💾 <span>${d.estimated_size}</span></div>
          <div class="meta-chip">📄 <span>${(d.format||'CSV').toUpperCase()}</span></div>
          <div class="meta-chip">🔖 <span>v${d.version}</span></div>
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" style="flex:1;"
            onclick="event.stopPropagation();startAnalysis('${d.dataset_name}')">
            ⚡ Analyze
          </button>
          <button class="btn btn-ghost btn-sm"
            onclick="event.stopPropagation();openDatasetModal('${d.dataset_name}')">
            🔍 Details
          </button>
        </div>
      </div>
    `).join('');
  }

  function renderSkeletons() {
    document.getElementById('datasets-grid').innerHTML = Array(6).fill(0).map(() => `
      <div class="dataset-card">
        <div class="skeleton" style="height:22px;width:80px;margin-bottom:12px;"></div>
        <div class="skeleton" style="height:18px;width:70%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:14px;width:100%;margin-bottom:4px;"></div>
        <div class="skeleton" style="height:14px;width:85%;margin-bottom:16px;"></div>
        <div style="display:flex;gap:8px;margin-bottom:16px;">
          <div class="skeleton" style="height:26px;width:80px;"></div>
          <div class="skeleton" style="height:26px;width:60px;"></div>
          <div class="skeleton" style="height:26px;width:70px;"></div>
        </div>
        <div class="skeleton" style="height:34px;width:100%;"></div>
      </div>
    `).join('');
  }

  // ── Dataset Detail Modal ─────────────────────────────────────────────────
  function openDatasetModal(name) {
    const ds = allDatasets.find(d => d.dataset_name === name);
    if (!ds) return;
    document.getElementById('modal-content').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
        <div>
          <span class="dataset-category-badge badge-${ds.category}"
            style="margin-bottom:8px;display:inline-block;">${ds.category}</span>
          <h2 style="font-family:var(--font-display);font-size:20px;font-weight:800;">
            ${ds.dataset_name.replace(/_/g,' ')}
          </h2>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="closeModal()">✕</button>
      </div>

      <div class="alert alert-info" style="margin-bottom:20px;">
        <span>📖</span><span>${ds.description}</span>
      </div>

      <div class="grid-2" style="margin-bottom:20px;">
        <div class="metric-item"><div class="metric-item-label">Estimated Size</div><div class="metric-item-value">${ds.estimated_size}</div></div>
        <div class="metric-item"><div class="metric-item-label">Format</div><div class="metric-item-value">${(ds.format||'CSV').toUpperCase()}</div></div>
        <div class="metric-item"><div class="metric-item-label">Version</div><div class="metric-item-value">${ds.version}</div></div>
        <div class="metric-item"><div class="metric-item-label">Last Updated</div><div class="metric-item-value">${ds.last_updated}</div></div>
        <div class="metric-item"><div class="metric-item-label">Primary Metric</div><div class="metric-item-value" style="font-size:13px;">${ds.primary_metric}</div></div>
        <div class="metric-item"><div class="metric-item-label">Time Column</div><div class="metric-item-value" style="font-size:13px;">${ds.time_column || 'None'}</div></div>
      </div>

      ${ds.source_url ? `<a href="${ds.source_url}" target="_blank" class="btn btn-ghost btn-sm" style="margin-bottom:16px;">🔗 View Source Dataset</a>` : ''}

      ${ds.columns && ds.columns.length ? `
        <div style="margin-bottom:20px;">
          <div style="font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:8px;">COLUMNS (${ds.columns.length})</div>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            ${ds.columns.map(c => `<span class="tag">${c}</span>`).join('')}
          </div>
        </div>
      ` : ''}

      <div style="display:flex;gap:10px;margin-top:8px;">
        <button class="btn btn-primary" style="flex:1;"
          onclick="closeModal();startAnalysis('${ds.dataset_name}')">
          ⚡ Start Analysis
        </button>
        <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      </div>
    `;
    const overlay = document.getElementById('modal-overlay');
    overlay.classList.remove('hidden');
    overlay.style.display = 'flex';
  }

  function closeModal(event) {
    if (!event || event.target === document.getElementById('modal-overlay')) {
      const overlay = document.getElementById('modal-overlay');
      overlay.classList.add('hidden');
      overlay.style.display = 'none';
    }
  }

  // ── Start Analysis ────────────────────────────────────────────────────────
  async function startAnalysis(datasetName) {
    toast('Starting analysis...', `Dataset: ${datasetName}`, 'info', 2500);
    try {
      const res = await api('POST', `/analyze/${datasetName}`, { filters: null });
      saveCurrentJob(res.job_id, datasetName);
      toast('Analysis job started!', `Job ID: ${res.job_id.slice(0,8)}...`, 'success');
      setTimeout(() => { window.location.href = 'job_status.html'; }, 1200);
    } catch (e) {
      toast('Failed to start analysis', e.message, 'error');
    }
  }
</script>
</body>
</html>
